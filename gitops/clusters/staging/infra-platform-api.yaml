apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infra-platform-api
  namespace: flux-system
spec:
  dependsOn:
    - name: infra-operator
  interval: 30m
  path: ./gitops/infrastructure/platform-api
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
