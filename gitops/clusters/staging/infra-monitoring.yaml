apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infra-monitoring
  namespace: flux-system
spec:
  dependsOn:
    - name: infra-sources
  interval: 30m
  path: ./gitops/infrastructure/monitoring
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
