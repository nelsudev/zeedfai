apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infra-strimzi
  namespace: flux-system
spec:
  dependsOn:
    - name: infra-sources
  interval: 30m
  path: ./gitops/infrastructure/strimzi
  prune: true
  wait: true
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
