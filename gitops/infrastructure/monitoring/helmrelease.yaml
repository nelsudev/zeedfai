apiVersion: v1
kind: Namespace
metadata:
  name: monitoring
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: monitoring
  namespace: monitoring
spec:
  interval: 30m
  chart:
    spec:
      chart: kube-prometheus-stack
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: flux-system
  install:
    remediation:
      retries: 3
  values:
    grafana:
      adminPassword: zeedfai
    # Por default o chart só seleciona ServiceMonitors/Rules com o label
    # release=monitoring — o que tornaria invisíveis os recursos gerados
    # pelo zeedfai-operator (e cegaria a análise de canary e o SLO check,
    # que "falham aberto"). Nil selectors = selecionar todos no cluster.
    prometheus:
      prometheusSpec:
        serviceMonitorSelectorNilUsesHelmValues: false
        podMonitorSelectorNilUsesHelmValues: false
        ruleSelectorNilUsesHelmValues: false
        probeSelectorNilUsesHelmValues: false
