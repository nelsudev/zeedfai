# Exposes the operator's own metrics (zeedfai_operator_*: lag, desired/ready
# replicas per pipeline) to Prometheus — this is where the platform-api GUI
# gets its lag/replicas time series from.
apiVersion: v1
kind: Service
metadata:
  name: zeedfai-operator-metrics
  namespace: zeedfai-system
  labels: {app: zeedfai-operator}
spec:
  selector: {app: zeedfai-operator}
  ports:
    - name: metrics
      port: 8083
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: zeedfai-operator
  namespace: zeedfai-system
spec:
  selector:
    matchLabels: {app: zeedfai-operator}
  endpoints:
    - port: metrics
      interval: 15s
