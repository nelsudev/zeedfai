apiVersion: apps/v1
kind: Deployment
metadata:
  name: loadgen
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels: {app: loadgen}
  template:
    metadata:
      labels: {app: loadgen}
    spec:
      containers:
        - name: loadgen
          image: zeedfai/loadgen:dev
          imagePullPolicy: IfNotPresent
          env:
            - name: KAFKA_BROKERS
              value: zeedfai-kafka-bootstrap.kafka:9092
            - name: KAFKA_TOPIC
              value: transactions
            - name: BASE_RATE
              value: "100"
          ports:
            - containerPort: 8081
---
apiVersion: v1
kind: Service
metadata:
  name: loadgen
  namespace: default
spec:
  selector: {app: loadgen}
  ports:
    - port: 8081
